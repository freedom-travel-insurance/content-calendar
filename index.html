<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #ffffff; --bg2: #f7f6f2; --bg3: #f1f0eb;
  --text: #1a1a18; --text2: #5a5a56; --text3: #9a9a96;
  --border: rgba(0,0,0,0.1); --border2: rgba(0,0,0,0.18);
  --radius: 8px; --radius-lg: 12px;
  --green: #1D9E75; --shadow: 0 1px 3px rgba(0,0,0,0.07);
}
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg3); color: var(--text); min-height: 100vh; }
#auth-screen { display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; gap:1.5rem; padding:2rem; }
#auth-screen h1 { font-size:22px; font-weight:500; }
#auth-screen p { font-size:14px; color:var(--text2); text-align:center; max-width:320px; line-height:1.6; }
.btn-google { display:flex; align-items:center; gap:10px; padding:10px 20px; border-radius:var(--radius); border:0.5px solid var(--border2); background:#fff; cursor:pointer; font-size:14px; font-weight:500; color:var(--text); box-shadow:var(--shadow); }
.btn-google:hover { box-shadow:0 2px 8px rgba(0,0,0,0.12); }
.btn-google svg { width:18px; height:18px; flex-shrink:0; }
#app { display:none; max-width:1200px; margin:0 auto; padding:1.25rem 1rem 4rem; }
.topbar { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:1rem; flex-wrap:wrap; gap:10px; }
.topbar-left h1 { font-size:20px; font-weight:500; }
.topbar-left p { font-size:12px; color:var(--text2); margin-top:2px; }
.topbar-right { display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
.user-pill { display:flex; align-items:center; gap:6px; font-size:12px; color:var(--text2); }
.user-pill img { width:24px; height:24px; border-radius:50%; border:0.5px solid var(--border); }
.btn-signout { font-size:11px; padding:3px 10px; border-radius:20px; border:0.5px solid var(--border2); background:transparent; cursor:pointer; color:var(--text2); }
.stats { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:1rem; }
.stat-pill { font-size:11px; padding:3px 10px; border-radius:20px; font-weight:500; }
.toolbar { display:flex; gap:8px; flex-wrap:wrap; align-items:center; margin-bottom:1rem; }
.toolbar label { font-size:11px; color:var(--text3); }
.toolbar select { font-size:12px; padding:5px 8px; border-radius:var(--radius); border:0.5px solid var(--border2); background:#fff; color:var(--text); cursor:pointer; }
.view-toggle { display:flex; border:0.5px solid var(--border2); border-radius:var(--radius); overflow:hidden; margin-left:auto; }
.view-btn { font-size:12px; padding:5px 14px; border:none; background:#fff; cursor:pointer; color:var(--text2); border-right:0.5px solid var(--border2); }
.view-btn:last-child { border-right:none; }
.view-btn.active { background:var(--green); color:#fff; font-weight:500; }
.btn-add { font-size:12px; padding:5px 14px; border-radius:var(--radius); border:0.5px solid var(--border2); background:#fff; cursor:pointer; color:var(--text); }
.btn-add:hover { background:var(--bg2); }
.form-card { background:#fff; border:0.5px solid var(--border); border-radius:var(--radius-lg); padding:1rem; margin-bottom:1rem; box-shadow:var(--shadow); }
.form-card h3 { font-size:13px; font-weight:500; margin-bottom:12px; }
.form-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-bottom:8px; }
.form-field label { font-size:11px; color:var(--text2); display:block; margin-bottom:3px; }
.form-field input, .form-field select, .form-field textarea { font-family:inherit; font-size:12px; padding:5px 8px; border-radius:var(--radius); border:0.5px solid var(--border2); background:#fff; color:var(--text); width:100%; }
.form-field textarea { resize:vertical; }
.form-actions { display:flex; gap:8px; margin-top:10px; align-items:center; }
.btn-primary { font-size:12px; padding:6px 16px; border-radius:var(--radius); border:none; background:var(--green); color:#fff; cursor:pointer; font-weight:500; }
.btn-secondary { font-size:12px; padding:6px 14px; border-radius:var(--radius); border:0.5px solid var(--border2); background:transparent; color:var(--text2); cursor:pointer; }
.btn-danger { font-size:12px; padding:6px 14px; border-radius:var(--radius); border:none; background:#FCEBEB; color:#A32D2D; cursor:pointer; margin-left:auto; }
/* CALENDAR */
.cal-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:4px; }
.cal-day-label { font-size:10px; font-weight:500; text-transform:uppercase; letter-spacing:0.5px; color:var(--text3); text-align:center; padding:4px 0 6px; }
.cal-cell { min-height:120px; border-radius:var(--radius); border:0.5px solid var(--border); background:#fff; padding:5px; }
.cal-cell.empty { background:transparent; border-color:transparent; }
.cal-cell.weekend { background:var(--bg2); }
.cal-date { font-size:11px; font-weight:500; color:var(--text2); margin-bottom:4px; }
.cal-chip { border-radius:4px; padding:2px 5px; font-size:9px; line-height:1.4; margin-bottom:2px; cursor:pointer; display:block; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; font-weight:500; }
.cal-chip:hover { opacity:0.8; }
.cal-more { font-size:10px; color:var(--text3); margin-top:2px; cursor:pointer; }
.cal-holiday { font-size:9px; color:#A32D2D; background:#FCEBEB; border-radius:4px; padding:2px 5px; margin-bottom:2px; font-weight:500; }
/* LIST */
.week-group { margin-bottom:1.25rem; border-radius:var(--radius-lg); overflow:hidden; border:0.5px solid; }
.week-head { padding:9px 14px; display:flex; justify-content:space-between; align-items:center; }
.week-head-title { font-size:13px; font-weight:500; }
.week-head-sub { font-size:11px; opacity:0.75; }
.item-row { border-bottom:0.5px solid; background:#fff; }
.item-row:last-child { border-bottom:none; }
.item-summary { padding:10px 14px; cursor:pointer; display:flex; justify-content:space-between; align-items:flex-start; gap:8px; }
.item-summary:hover { background:var(--bg2); }
.item-left { flex:1; min-width:0; }
.item-meta { display:flex; gap:5px; align-items:center; flex-wrap:wrap; margin-bottom:4px; }
.item-date-label { font-size:11px; color:var(--text3); min-width:72px; }
.pill { font-size:10px; padding:2px 8px; border-radius:20px; font-weight:500; white-space:nowrap; display:inline-block; }
.item-idea { font-size:12px; color:var(--text); line-height:1.5; }
.item-expanded { padding:1rem 14px; background:var(--bg2); border-top:0.5px solid var(--border); }
.edit-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:10px; }
.edit-meta { display:grid; grid-template-columns:repeat(4,1fr); gap:8px; margin-bottom:10px; }
/* MODAL */
.modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.35); display:flex; align-items:center; justify-content:center; z-index:100; padding:1rem; }
.modal { background:#fff; border-radius:var(--radius-lg); padding:1.25rem; width:100%; max-width:500px; box-shadow:0 8px 32px rgba(0,0,0,0.15); max-height:85vh; overflow-y:auto; }
.modal-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:1rem; }
.modal-header h3 { font-size:15px; font-weight:500; }
.modal-close { font-size:20px; cursor:pointer; color:var(--text3); background:none; border:none; line-height:1; }
.empty { padding:2rem; text-align:center; color:var(--text2); font-size:13px; }
#loading { display:flex; align-items:center; justify-content:center; min-height:100vh; font-size:14px; color:var(--text2); }
</style>
</head>

async function saveItem(item){saving=true;render();await db.collection("content-items").doc(item.id).set(item);saving=false;}
async function addNewItem(item){saving=true;render();const ref=db.collection("content-items").doc();await ref.set({...item,id:ref.id});saving=false;}
async function removeItem(id){saving=true;render();await db.collection("content-items").doc(id).delete();saving=false;}
function esc(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}
function pill(bg,color,text){return `<span class="pill" style="background:${bg};color:${color}">${esc(text)}</span>`;}
function sel(val,opts,fn){return `<select onchange="${fn}">${opts.map(o=>`<option${o===val?" selected":""}>${esc(o)}</option>`).join("")}</select>`;}
function filtered(){return items.filter(i=>(filters.brand==="All"||i.brand===filters.brand)&&(filters.channel==="All"||i.channel===filters.channel)&&(filters.status==="All"||i.status===filters.status));}
window.signIn=signIn;window.signOut=signOut;
window.setFilter=(k,v)=>{filters[k]=v;render();};
window.setView=(v)=>{view=v;expandedId=null;editForm={};modalDay=null;render();};
window.toggleAdd=()=>{showAdd=!showAdd;expandedId=null;editForm={};render();};
window.openModal=(day)=>{modalDay=day;render();};
window.closeModal=()=>{modalDay=null;render();};
window.toggleRow=(id)=>{if(expandedId===id){expandedId=null;editForm={};}else{const i=items.find(x=>x.id===id);expandedId=id;editForm={...i};showAdd=false;}render();};
window.onEF=(k,v)=>{editForm[k]=v;};
window.onNF=(k,v)=>{newItem[k]=v;};
window.doSave=async()=>{const c={...editForm};expandedId=null;editForm={};await saveItem(c);};
window.doDel=async()=>{const id=editForm.id;expandedId=null;editForm={};await removeItem(id);};
window.doCancel=()=>{expandedId=null;editForm={};render();};
window.doAdd=async()=>{if(!newItem.idea.trim()){alert("Please enter a content idea.");return;}const c={...newItem};showAdd=false;newItem={date:"",week:"Week 1",theme:"Easter",brand:"Freedom",channel:"Blog",idea:"",status:"To Do",notes:"",link:""};await addNewItem(c);};
window.doCancelAdd=()=>{showAdd=false;render();};
window.openItem=(id)=>{modalDay=null;view="list";const i=items.find(x=>x.id===id);expandedId=id;editForm={...i};render();};
function editPanel(){
  return `<div class="item-expanded">
    <div class="edit-grid">
      <div class="form-field"><label>Content idea</label><textarea rows="3" oninput="onEF('idea',this.value)">${esc(editForm.idea||"")}</textarea></div>
      <div class="form-field"><label>Notes</label><textarea rows="3" oninput="onEF('notes',this.value)" placeholder="Notes, copy ideas or feedback...">${esc(editForm.notes||"")}</textarea></div>
    </div>
    <div class="edit-meta">
      <div class="form-field"><label>Status</label>${sel(editForm.status||"To Do",STATUSES,"onEF('status',this.value)")}</div>
      <div class="form-field"><label>Brand</label>${sel(editForm.brand||"Freedom",BRANDS,"onEF('brand',this.value)")}</div>
      <div class="form-field"><label>Channel</label>${sel(editForm.channel||"Blog",CHANNELS,"onEF('channel',this.value)")}</div>
      <div class="form-field"><label>Date</label><input value="${esc(editForm.date||"")}" oninput="onEF('date',this.value)"/></div>
    </div>
    <div class="form-field" style="margin-bottom:10px;"><label>Link to published content</label><input value="${esc(editForm.link||"")}" oninput="onEF('link',this.value)" placeholder="https://..."/></div>
    <div class="form-actions">
      <button class="btn-primary" onclick="doSave()">Save</button>
      <button class="btn-secondary" onclick="doCancel()">Cancel</button>
      <button class="btn-danger" onclick="doDel()">Delete</button>
    </div>
  </div>`;
}
function render(){
  const app=document.getElementById("app");
  if(!app)return;
  const f=filtered();
  const sc=STATUSES.reduce((a,s)=>({...a,[s]:items.filter(i=>i.status===s).length}),{});
  const topbar=`<div class="topbar">
    <div class="topbar-left"><h1>Content Calendar — April 2026</h1><p>${saving?'Saving...':`${items.length} items · 3 brands`}</p></div>
    <div class="topbar-right">
      ${currentUser?`<div class="user-pill"><img src="${esc(currentUser.photoURL||"")}" alt=""/>${esc(currentUser.displayName||currentUser.email)}</div>`:""}
      <button class="btn-signout" onclick="signOut()">Sign out</button>
    </div>
  </div>`;
  const stats=`<div class="stats"><span class="stat-pill" style="background:#F1EFE8;color:#444441;">${items.length} total</span>${STATUSES.map(s=>{const st=STAT_CH[s];return`<span class="stat-pill" style="background:${st.bg};color:${st.color}">${sc[s]} ${s.toLowerCase()}</span>`;}).join("")}</div>`;
  const toolbar=`<div class="toolbar">
    <label>Filter:</label>
    ${["brand","channel","status"].map(k=>{const opts=k==="brand"?["All",...BRANDS]:k==="channel"?["All",...CHANNELS]:["All",...STATUSES];return`<select onchange="setFilter('${k}',this.value)">${opts.map(o=>`<option${o===filters[k]?" selected":""}>${esc(o)}</option>`).join("")}</select>`;}).join("")}
    <div class="view-toggle">
      <button class="view-btn${view==="calendar"?" active":""}" onclick="setView('calendar')">Calendar</button>
      <button class="view-btn${view==="list"?" active":""}" onclick="setView('list')">List</button>
    </div>
    <button class="btn-add" onclick="toggleAdd()">${showAdd?"✕ Cancel":"+ Add item"}</button>
  </div>`;
  let addForm="";
  if(showAdd){addForm=`<div class="form-card"><h3>New content item</h3>
    <div class="form-grid">
      <div class="form-field"><label>Brand</label>${sel(newItem.brand,BRANDS,"onNF('brand',this.value)")}</div>
      <div class="form-field"><label>Channel</label>${sel(newItem.channel,CHANNELS,"onNF('channel',this.value)")}</div>
      <div class="form-field"><label>Status</label>${sel(newItem.status,STATUSES,"onNF('status',this.value)")}</div>
      <div class="form-field"><label>Week</label>${sel(newItem.week,WEEKS,"onNF('week',this.value)")}</div>
      <div class="form-field"><label>Theme</label>${sel(newItem.theme,THEMES,"onNF('theme',this.value)")}</div>
      <div class="form-field"><label>Date</label><input value="${esc(newItem.date)}" oninput="onNF('date',this.value)" placeholder="e.g. Tue 1 Apr"/></div>
    </div>
    <div class="form-field" style="margin-bottom:8px;"><label>Content idea</label><textarea rows="2" oninput="onNF('idea',this.value)" placeholder="Enter the content idea...">${esc(newItem.idea)}</textarea></div>
    <div class="form-field" style="margin-bottom:10px;"><label>Notes</label><textarea rows="1" oninput="onNF('notes',this.value)" placeholder="Optional notes...">${esc(newItem.notes)}</textarea></div>
    <div class="form-actions"><button class="btn-primary" onclick="doAdd()">Save item</button><button class="btn-secondary" onclick="doCancelAdd()">Cancel</button></div>
  </div>`;}
  let main="";
  if(view==="calendar"){
    const labels=["Mon","Tue","Wed","Thu","Fri","Sat","Sun"].map(d=>`<div class="cal-day-label">${d}</div>`).join("");
    const cells=CAL_DAYS.map(cell=>{
      if(!cell.d)return`<div class="cal-cell empty"></div>`;
      const isWE=cell.dow===0||cell.dow===6;
      const di=f.filter(i=>i.dayNum===cell.d);
      const max=3;
      const chips=di.slice(0,max).map(item=>{const bc=BRAND_CH[item.brand]||BRAND_CH["Freedom"];return`<span class="cal-chip" style="background:${bc.bg};color:${bc.color}" onclick="openItem('${item.id}')" title="${esc(item.idea)}">${esc(item.brand)}: ${esc(item.idea)}</span>`;}).join("");
      const more=di.length>max?`<div class="cal-more" onclick="openModal(${cell.d})">+${di.length-max} more</div>`:"";
      const hol=cell.holiday?`<div class="cal-holiday">${cell.holiday}</div>`:"";
      return`<div class="cal-cell${isWE?" weekend":""}"><div class="cal-date">${cell.d}</div>${hol}${chips}${more}</div>`;
    }).join("");
    main=`<div class="cal-grid">${labels}${cells}</div>`;
  } else {
    const weeks=WEEKS.map(week=>{
      const meta=WEEK_META[week];const tc=THEME_CH[meta.theme];
      const wi=f.filter(i=>i.week===week);
      if(!wi.length)return"";
      const rows=wi.map(item=>{
        const isOpen=expandedId===item.id;
        const bc=BRAND_CH[item.brand]||BRAND_CH["Freedom"];
        const cc=CHAN_CH[item.channel]||CHAN_CH["Blog"];
        const stt=STAT_CH[item.status]||STAT_CH["To Do"];
        const icons=(item.link?` <span style="font-size:10px;color:#185FA5">↗</span>`:"")+(item.notes?` <span style="font-size:10px;color:var(--text3)">✎</span>`:"");
        return`<div class="item-row" style="border-color:${tc.border}">
          <div class="item-summary" onclick="toggleRow('${item.id}')" style="background:${isOpen?"var(--bg2)":"#fff"}">
            <div class="item-left">
              <div class="item-meta"><span class="item-date-label">${esc(item.date)}</span>${pill(bc.bg,bc.color,item.brand)}${pill(cc.bg,cc.color,item.channel)}${icons}</div>
              <div class="item-idea">${esc(item.idea)}</div>
            </div>
            <div>${pill(stt.bg,stt.color,item.status)}</div>
          </div>
          ${isOpen?editPanel():""}
        </div>`;
      }).join("");
      return`<div class="week-group" style="border-color:${tc.border}">
        <div class="week-head" style="background:${tc.bg}">
          <span class="week-head-title" style="color:${tc.color}">${week} — ${meta.label}</span>
          <span class="week-head-sub" style="color:${tc.color}">${meta.dates} · ${wi.length} items</span>
        </div>${rows}
      </div>`;
    }).join("");
    main=f.length===0?`<div class="empty">No items match your filters.</div>`:weeks;
  }
  let modal="";
  if(modalDay!==null){
    const di=filtered().filter(i=>i.dayNum===modalDay);
    const rows=di.map(item=>{const bc=BRAND_CH[item.brand]||BRAND_CH["Freedom"];const cc=CHAN_CH[item.channel]||CHAN_CH["Blog"];const stt=STAT_CH[item.status]||STAT_CH["To Do"];
      return`<div style="padding:10px 0;border-bottom:0.5px solid var(--border);cursor:pointer" onclick="openItem('${item.id}')">
        <div style="display:flex;gap:5px;flex-wrap:wrap;margin-bottom:4px">${pill(bc.bg,bc.color,item.brand)}${pill(cc.bg,cc.color,item.channel)}${pill(stt.bg,stt.color,item.status)}</div>
        <div style="font-size:12px;line-height:1.5">${esc(item.idea)}</div>
      </div>`;
    }).join("");
    modal=`<div class="modal-overlay" onclick="if(event.target===this)closeModal()">
      <div class="modal">
        <div class="modal-header"><h3>April ${modalDay} — ${di.length} item${di.length!==1?"s":""}</h3><button class="modal-close" onclick="closeModal()">×</button></div>
        ${rows||`<p style="font-size:13px;color:var(--text2)">No items on this day.</p>`}
      </div>
    </div>`;
  }
  app.innerHTML=topbar+stats+toolbar+addForm+main+modal;
}
</script>
</body>
</html>
